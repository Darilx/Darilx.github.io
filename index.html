<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOED</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.55);
      z-index: -1;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 22px 30px;
      z-index: 100;
    }

    nav button {
      background: none;
      border: none;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 22px;
      letter-spacing: 8px;
      text-transform: uppercase;
      opacity: 1;
      cursor: pointer;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.65);
    }

    @media (max-width: 600px) {
      nav button {
        font-size: 18px;
        letter-spacing: 6px;
      }
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 110px 24px 80px;
      max-width: 720px;
      margin: 0 auto;
    }

    .legend {
      font-size: 13px;
      letter-spacing: 2px;
      line-height: 2;
      opacity: 0.92;
      text-transform: uppercase;
    }

    .legend .accent {
      display: block;
      margin-top: 28px;
      font-size: 11px;
      letter-spacing: 3px;
      opacity: 0.65;
    }

    .album-title {
      display: block;
      margin-top: 14px;
      font-size: 26px;
      letter-spacing: 8px;
      opacity: 1;
      font-weight: normal;
    }

    @media (max-width: 600px) {
      .album-title { font-size: 22px; letter-spacing: 6px; }
    }

    #mouseAura {
      position: fixed;
      top: 0; left: 0;
      width: 50px; height: 50px;
      border-radius: 50%;
      pointer-events: none;
      background: radial-gradient(circle,
        rgba(255,255,255,0.5) 0%,
        rgba(255,255,255,0.18) 40%,
        rgba(255,255,255,0) 70%);
      mix-blend-mode: screen;
      transform: translate(-50%, -50%);
      filter: blur(5px);
      z-index: 9999;
    }

    #energyParticles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9998;
    }

    @media (max-width: 600px) {
      .legend { font-size: 12px; letter-spacing: 1.5px; }
      .legend .accent { font-size: 10px; }
    }

    .tracks {
      margin-top: 50px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      align-items: center;
    }

    .track {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .play-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      outline: none;
      background:
        radial-gradient(circle at 30% 25%,
          rgba(255,255,255,0.9) 0%,
          rgba(220,220,225,0.6) 18%,
          rgba(140,140,150,0.4) 45%,
          rgba(60,60,70,0.5) 75%,
          rgba(20,20,25,0.7) 100%);
      box-shadow:
        inset 0 1px 2px rgba(255,255,255,0.6),
        inset 0 -2px 4px rgba(0,0,0,0.5),
        0 2px 8px rgba(0,0,0,0.5),
        0 0 0 1px rgba(255,255,255,0.15);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .play-btn:hover {
      transform: scale(1.05);
      box-shadow:
        inset 0 1px 2px rgba(255,255,255,0.8),
        inset 0 -2px 4px rgba(0,0,0,0.5),
        0 3px 12px rgba(255,255,255,0.2),
        0 0 0 1px rgba(255,255,255,0.3);
    }

    .play-btn:active {
      transform: scale(0.97);
    }

    .play-btn svg {
      width: 18px;
      height: 18px;
      fill: rgba(20,20,25,0.85);
      filter: drop-shadow(0 1px 1px rgba(255,255,255,0.4));
    }

    .track-name {
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.85;
    }

    .download-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      outline: none;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }

    .download-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.8);
      transform: scale(1.08);
    }

    .download-btn svg {
      width: 14px;
      height: 14px;
      fill: white;
      opacity: 0.9;
    }

    .corner-note {
      position: fixed;
      bottom: 22px;
      right: 24px;
      max-width: 260px;
      text-align: right;
      font-size: 9px;
      letter-spacing: 1.5px;
      line-height: 1.7;
      opacity: 0.55;
      text-transform: uppercase;
      z-index: 50;
    }

    .corner-note .heb {
      opacity: 0.75;
      margin-bottom: 6px;
    }

    @media (max-width: 600px) {
      .corner-note {
        font-size: 8px;
        letter-spacing: 1.2px;
        max-width: 200px;
        bottom: 16px;
        right: 16px;
      }
    }
  </style>

</head>

<body>

  <video class="bg-video" autoplay loop muted playsinline preload="auto" id="bgVideo">
    <source src="ahh%20nefileo%20visualizer%20v2.mp4" type="video/mp4">
    Tu navegador no soporta video HTML5.
  </video>
  <div class="overlay"></div>

  <script>
    const bgVid = document.getElementById('bgVideo');
    bgVid.addEventListener('error', () => {
      console.error('Video error:', bgVid.error);
    });
    bgVid.addEventListener('loadeddata', () => {
      console.log('Video loaded OK');
    });
    bgVid.play().catch(err => console.warn('Autoplay blocked:', err));
  </script>

  <nav>
    <button class="active">MOED</button>
  </nav>

  <div class="page">
    <div class="legend">
      Tiny Album<br>
      <span class="album-title">Nefileo</span>

      <div class="tracks">
        <div class="track">
          <audio id="audio-anglo" preload="none">
            <source src="Mixea_HighNeutral_scare%20v1.wav" type="audio/wav">
          </audio>
          <button class="play-btn" id="btn-anglo" aria-label="Play Anglo" onclick="togglePlay('audio-anglo','btn-anglo')">
            <svg id="svg-anglo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <polygon points="6,4 20,12 6,20"/>
            </svg>
          </button>
          <span class="track-name">Anglo</span>
          <a class="download-btn" href="Mixea_HighNeutral_scare%20v1.wav" download="Anglo.wav" aria-label="Download Anglo" onclick="gtag('event','download',{event_category:'Audio',event_label:'Anglo'})">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 3v12m0 0l-5-5m5 5l5-5M5 21h14" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>

        <div class="track">
          <audio id="audio-moed" preload="none">
            <source src="Mixea_MediumNeutral_vision%201v.wav" type="audio/wav">
          </audio>
          <button class="play-btn" id="btn-moed" aria-label="Play Moed" onclick="togglePlay('audio-moed','btn-moed')">
            <svg id="svg-moed" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <polygon points="6,4 20,12 6,20"/>
            </svg>
          </button>
          <span class="track-name">Moed</span>
          <a class="download-btn" href="Mixea_MediumNeutral_vision%201v.wav" download="Moed.wav" aria-label="Download Moed" onclick="gtag('event','download',{event_category:'Audio',event_label:'Moed'})">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 3v12m0 0l-5-5m5 5l5-5M5 21h14" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="corner-note">
    <div class="heb">Moed — מועד</div>
    Hebreo: tiempo señalado, cita divina.
  </div>

  <div id="mouseAura"></div>
  <canvas id="energyParticles"></canvas>

  <script>
    const PLAY_ICON  = '<polygon points="6,4 20,12 6,20"/>';
    const PAUSE_ICON = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';

    function togglePlay(audioId, btnId) {
      const audio = document.getElementById(audioId);
      const key   = btnId.replace('btn-','');
      const svg   = document.getElementById('svg-' + key);

      document.querySelectorAll('audio').forEach(a => {
        if (a.id !== audioId) {
          a.pause();
          const k = a.id.replace('audio-','');
          const s = document.getElementById('svg-' + k);
          if (s) s.innerHTML = PLAY_ICON;
        }
      });

      if (audio.paused) {
        audio.play();
        svg.innerHTML = PAUSE_ICON;
      } else {
        audio.pause();
        svg.innerHTML = PLAY_ICON;
      }
    }

    document.querySelectorAll('audio').forEach(audio => {
      audio.addEventListener('ended', () => {
        const k = audio.id.replace('audio-','');
        const s = document.getElementById('svg-' + k);
        if (s) s.innerHTML = PLAY_ICON;
      });
    });

    const aura = document.getElementById('mouseAura');
    document.addEventListener('mousemove', e => {
      aura.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
    });

    const canvas = document.getElementById('energyParticles');
    const ctx    = canvas.getContext('2d');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles  = [];
    let globalHue  = 0;
    const burstIntensity = 10;

    window.addEventListener('resize', () => {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    document.addEventListener('mousemove', e => {
      globalHue = (globalHue + 4) % 360;
      for (let i = 0; i < burstIntensity; i++) {
        const life = Math.random() * 70 + 35;
        particles.push({
          x:       e.clientX + (Math.random() - 0.5) * 14,
          y:       e.clientY + (Math.random() - 0.5) * 14,
          vx:      (Math.random() - 0.5) * 0.5,
          vy:      -(Math.random() * 0.9 + 0.15),
          size:    Math.random() * 2.2 + 0.3,
          life:    life,
          maxLife: life,
          hue:     (globalHue + Math.random() * 50) % 360
        });
      }
    });

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vx *= 0.975; p.vy *= 0.988;
        p.size *= 0.993; p.life--;
        const alpha = (p.life / p.maxLife) * 0.7;
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(p.size, 0.1), 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.hue}, 100%, 72%, ${alpha})`;
        ctx.fill();
        if (p.life <= 0) particles.splice(i, 1);
      }
      requestAnimationFrame(animate);
    }
    animate();
  </script>

</body>
</html>
